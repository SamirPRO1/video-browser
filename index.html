<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Video Browser</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f8f9fa;
    --surface: #ffffff;
    --border: #e0e0e0;
    --text: #202124;
    --text-secondary: #5f6368;
    --accent: #1a73e8;
    --accent-hover: #1557b0;
    --hover-bg: #f1f3f4;
    --danger: #d93025;
    --danger-hover: #b31412;
    --row-height: 44px;
    --radius: 8px;
    --shadow: 0 1px 3px rgba(0,0,0,0.12), 0 1px 2px rgba(0,0,0,0.08);
  }

  body {
    font-family: 'Google Sans', Roboto, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* Top bar */
  .topbar {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    height: 64px;
    display: flex;
    align-items: center;
    gap: 16px;
    flex-shrink: 0;
    box-shadow: var(--shadow);
    z-index: 10;
  }
  .topbar-logo {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 20px;
    font-weight: 500;
    color: var(--text);
    cursor: pointer;
    flex: 1;
  }
  .topbar-logo svg { color: var(--accent); }

  .topbar-logout {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 8px 14px;
    border: 1px solid var(--border);
    border-radius: 20px;
    background: none;
    color: var(--text-secondary);
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.15s, color 0.15s;
    text-decoration: none;
  }
  .topbar-logout:hover { background: var(--hover-bg); color: var(--text); }

  /* Layout */
  .layout {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* Sidebar */
  .sidebar {
    width: 256px;
    background: var(--surface);
    border-right: 1px solid var(--border);
    padding: 16px 0;
    flex-shrink: 0;
    overflow-y: auto;
  }
  .sidebar-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 16px;
    cursor: pointer;
    border-radius: 0 24px 24px 0;
    margin-right: 16px;
    font-size: 14px;
    font-weight: 500;
    color: var(--text);
    transition: background 0.15s;
  }
  .sidebar-item:hover { background: var(--hover-bg); }
  .sidebar-item.active { background: #e8f0fe; color: var(--accent); }
  .sidebar-item svg { opacity: 0.7; }

  .sidebar-section {
    padding: 8px 16px 4px;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.6px;
    color: var(--text-secondary);
    margin-top: 8px;
  }

  .sidebar-action {
    display: flex;
    flex-direction: column;
    gap: 6px;
    padding: 10px 16px;
    margin-right: 16px;
    border-radius: 0 24px 24px 0;
    cursor: pointer;
    transition: background 0.15s;
  }
  .sidebar-action:hover { background: var(--hover-bg); }
  .sidebar-action-top {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 13px;
    font-weight: 500;
    color: var(--text);
  }
  .sidebar-action-top svg { opacity: 0.7; flex-shrink: 0; }
  .sidebar-action-sub {
    font-size: 11px;
    color: var(--text-secondary);
    padding-left: 30px;
  }
  .sidebar-prog-track {
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
    margin-left: 30px;
  }
  .sidebar-prog-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 2px;
    transition: width 0.5s;
  }
  .sidebar-prog-fill.done { background: #1e8e3e; }

  /* Main content */
  .main {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* Breadcrumb */
  .breadcrumb {
    padding: 12px 24px;
    display: flex;
    align-items: center;
    gap: 4px;
    font-size: 14px;
    flex-shrink: 0;
  }
  .breadcrumb-item {
    color: var(--accent);
    cursor: pointer;
    padding: 4px 6px;
    border-radius: 4px;
    transition: background 0.15s;
    white-space: nowrap;
  }
  .breadcrumb-item:hover { background: var(--hover-bg); }
  .breadcrumb-item.current {
    color: var(--text);
    cursor: default;
    font-weight: 500;
  }
  .breadcrumb-item.current:hover { background: none; }
  .breadcrumb-sep { color: var(--text-secondary); user-select: none; }

  /* File list header */
  .list-header {
    display: grid;
    grid-template-columns: 1fr 140px 100px 128px;
    padding: 0 24px;
    height: 36px;
    align-items: center;
    border-bottom: 1px solid var(--border);
    font-size: 12px;
    font-weight: 500;
    color: var(--text-secondary);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    flex-shrink: 0;
  }

  /* File list */
  .file-list {
    flex: 1;
    overflow-y: auto;
    padding: 8px 0;
  }
  .file-row {
    display: grid;
    grid-template-columns: 1fr 140px 100px 128px;
    padding: 0 24px;
    height: var(--row-height);
    align-items: center;
    cursor: pointer;
    transition: background 0.1s;
    font-size: 14px;
  }
  .file-row:hover { background: var(--hover-bg); }
  .file-row:active { background: #e8f0fe; }
  .file-name {
    display: flex;
    align-items: center;
    gap: 12px;
    overflow: hidden;
  }
  .file-name span {
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .file-icon { flex-shrink: 0; }
  .file-size { color: var(--text-secondary); font-size: 13px; }
  .file-date { color: var(--text-secondary); font-size: 13px; }

  .row-actions {
    display: flex;
    align-items: center;
    gap: 2px;
    opacity: 0;
    transition: opacity 0.15s;
    justify-content: flex-end;
  }
  .file-row:hover .row-actions { opacity: 1; }

  .action-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 28px;
    height: 28px;
    border-radius: 50%;
    border: none;
    background: none;
    color: var(--text-secondary);
    cursor: pointer;
    transition: background 0.15s, color 0.15s;
    flex-shrink: 0;
    text-decoration: none;
  }
  .action-btn:hover { background: var(--border); color: var(--accent); }
  .action-btn.danger:hover { background: #fce8e6; color: var(--danger); }
  .action-btn.sprites-ready { color: #1e8e3e; }
  .action-btn.sprites-ready:hover { background: #e6f4ea; color: #137333; }

  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    height: 200px;
    color: var(--text-secondary);
  }

  /* Video player overlay */
  .player-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    z-index: 100;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s;
  }
  .player-overlay.open {
    opacity: 1;
    pointer-events: all;
  }
  .player-container {
    width: 100%;
    max-width: 1100px;
    background: #000;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 24px 64px rgba(0,0,0,0.6);
    transform: scale(0.96);
    transition: transform 0.2s;
  }
  .player-overlay.open .player-container { transform: scale(1); }

  .player-topbar {
    background: #1a1a1a;
    padding: 12px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
  }
  .player-title {
    color: #fff;
    font-size: 15px;
    font-weight: 500;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .player-close {
    background: none;
    border: none;
    color: #aaa;
    cursor: pointer;
    padding: 4px;
    border-radius: 4px;
    display: flex;
    align-items: center;
    transition: color 0.15s;
    flex-shrink: 0;
  }
  .player-close:hover { color: #fff; }

  video {
    width: 100%;
    display: block;
    max-height: 75vh;
    background: #000;
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 8px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #dadce0; border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: #bdc1c6; }

  .loading {
    display: flex; align-items: center; justify-content: center;
    height: 120px; color: var(--text-secondary); gap: 12px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .spinner {
    width: 20px; height: 20px; border: 2px solid var(--border);
    border-top-color: var(--accent); border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }

  /* Player error banner */
  .player-error {
    display: none;
    align-items: center;
    gap: 10px;
    background: #3c1010;
    color: #f28b82;
    padding: 14px 20px;
    font-size: 14px;
  }
  .player-error svg { flex-shrink: 0; }

  /* Context menu */
  .ctx-menu {
    position: fixed;
    z-index: 200;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.14), 0 1px 4px rgba(0,0,0,0.08);
    padding: 4px 0;
    min-width: 192px;
    display: none;
  }
  .ctx-menu.open { display: block; }
  .ctx-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 9px 16px;
    font-size: 14px;
    color: var(--text);
    cursor: pointer;
    border: none;
    background: none;
    width: 100%;
    text-align: left;
    transition: background 0.1s;
  }
  .ctx-item:hover { background: var(--hover-bg); }
  .ctx-item.danger { color: var(--danger); }
  .ctx-item.danger:hover { background: #fce8e6; }
  .ctx-item svg { flex-shrink: 0; opacity: 0.75; }
  .ctx-sep {
    height: 1px;
    background: var(--border);
    margin: 4px 0;
  }

  /* Hover preview */
  .hover-preview {
    position: fixed;
    z-index: 160;
    width: 320px;
    background: #000;
    border-radius: 10px;
    overflow: hidden;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5), 0 2px 8px rgba(0,0,0,0.3);
    pointer-events: none;
    opacity: 0;
    transform: scale(0.95);
    transition: opacity 0.15s, transform 0.15s;
  }
  .hover-preview.visible {
    opacity: 1;
    transform: scale(1);
  }
  .hover-preview-img {
    width: 320px;
    height: 180px;
    background-color: #111;
    background-repeat: no-repeat;
    background-size: 320px 27000px; /* 150 frames × 180px */
  }
  @keyframes preview-roll {
    to { background-position-y: -27000px; }
  }
  .hover-preview-img.rolling {
    animation: preview-roll 10s steps(150) infinite;
  }
  .hover-preview-bar {
    background: #1a1a1a;
    padding: 8px 12px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .hover-preview-name {
    font-size: 12px;
    color: #ccc;
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .hover-preview-loading {
    width: 320px;
    height: 180px;
    background: #111;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
    color: #666;
    font-size: 12px;
  }
  .hover-preview-prog {
    width: 180px;
    height: 3px;
    background: #333;
    border-radius: 2px;
    overflow: hidden;
  }
  .hover-preview-prog-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 2px;
    transition: width 0.4s;
  }

  /* Sprite build notifications */
  .build-tray {
    position: fixed;
    bottom: 24px;
    right: 24px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    z-index: 250;
    pointer-events: none;
  }
  .build-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.18);
    padding: 14px 16px;
    min-width: 280px;
    max-width: 340px;
    pointer-events: all;
  }
  .build-card-top {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 10px;
  }
  .build-card-name {
    font-size: 13px;
    font-weight: 500;
    color: var(--text);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    flex: 1;
  }
  .build-card-pct {
    font-size: 13px;
    font-weight: 600;
    font-variant-numeric: tabular-nums;
    color: var(--accent);
    flex-shrink: 0;
  }
  .build-card-pct.done  { color: #1e8e3e; }
  .build-card-pct.error { color: var(--danger); }
  .build-bar-track {
    height: 6px;
    background: var(--hover-bg);
    border-radius: 3px;
    overflow: hidden;
  }
  .build-bar-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 3px;
    transition: width 0.4s ease;
  }
  .build-bar-fill.done  { background: #1e8e3e; }
  .build-bar-fill.error { background: var(--danger); }
  .build-card-label {
    font-size: 11px;
    color: var(--text-secondary);
    margin-top: 6px;
  }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 28px;
    left: 50%;
    transform: translateX(-50%) translateY(8px);
    background: #333;
    color: #fff;
    padding: 10px 22px;
    border-radius: 24px;
    font-size: 14px;
    opacity: 0;
    transition: opacity 0.18s, transform 0.18s;
    pointer-events: none;
    z-index: 300;
    white-space: nowrap;
  }
  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-logo" onclick="navigate('/')">
    <svg width="28" height="28" viewBox="0 0 24 24" fill="currentColor">
      <path d="M4 6H2v14c0 1.1.9 2 2 2h14v-2H4V6zm16-4H8c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-8 12.5v-9l6 4.5-6 4.5z"/>
    </svg>
    Video Browser
  </div>
  <a href="/logout" class="topbar-logout">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
      <path d="M17 7l-1.41 1.41L18.17 11H8v2h10.17l-2.58 2.58L17 17l5-5-5-5zM4 5h8V3H4c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h8v-2H4V5z"/>
    </svg>
    Sign out
  </a>
</div>

<div class="layout">
  <div class="sidebar">
    <div class="sidebar-item active" onclick="navigate('/')">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
        <path d="M10 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2h-8l-2-2z"/>
      </svg>
      All Videos
    </div>

    <div class="sidebar-section">Tools</div>
    <div class="sidebar-action" id="genAllBtn" onclick="startGenerateAll()">
      <div class="sidebar-action-top">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M21 3H3C2 3 1 4 1 5v14c0 1.1.9 2 2 2h18c1.1 0 2-.9 2-2V5c0-1-1-2-2-2zm0 16H3V5h18v14zM5 15h2v2H5zm0-4h2v2H5zm0-4h2v2H5zm4 8h6v2H9zm0-4h6v2H9zm0-4h6v2H9zm8 8h2v2h-2zm0-4h2v2h-2zm0-4h2v2h-2z"/></svg>
        Generate Previews
      </div>
      <div class="sidebar-action-sub" id="genAllStatus">All videos</div>
      <div class="sidebar-prog-track" id="genAllProgTrack" style="display:none">
        <div class="sidebar-prog-fill" id="genAllProgFill" style="width:0%"></div>
      </div>
    </div>
  </div>

  <div class="main">
    <div class="breadcrumb" id="breadcrumb"></div>
    <div class="list-header">
      <div>Name</div>
      <div>Modified</div>
      <div>Size</div>
      <div></div>
    </div>
    <div class="file-list" id="fileList"></div>
  </div>
</div>

<!-- Video player -->
<div class="player-overlay" id="playerOverlay">
  <div class="player-container">
    <div class="player-topbar">
      <div class="player-title" id="playerTitle"></div>
      <button class="player-close" onclick="closePlayer()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
          <path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/>
        </svg>
      </button>
    </div>
    <div class="player-error" id="playerError">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
        <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/>
      </svg>
      <span id="playerErrorMsg"></span>
    </div>
    <video id="videoEl" controls autoplay></video>
  </div>
</div>

<!-- Context menu -->
<div class="ctx-menu" id="ctxMenu" onclick="event.stopPropagation()">
  <button class="ctx-item" onclick="ctxEdit()">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M18.5 12c0-1.77-1.02-3.29-2.5-4.03V8.05c0-.55-.45-1-1-1s-1 .45-1 1v.07C12.12 8.72 11 10.28 11 12c0 1.77 1.02 3.29 2.5 4.03v3.92c0 .55.45 1 1 1s1-.45 1-1v-3.92c1.48-.74 2.5-2.26 2.5-4.03zm-3.5 2c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zM5 7.5v9c0 .83.67 1.5 1.5 1.5S8 17.33 8 16.5v-9C8 6.67 7.33 6 6.5 6S5 6.67 5 7.5zm-2 0v9C3 17.93 4.07 19 5.5 19S8 17.93 8 16.5v-9C8 6.07 6.93 5 5.5 5S3 6.07 3 7.5z"/></svg>
    Edit / Clip
  </button>
  <button class="ctx-item" onclick="ctxBuildSprites()">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M21 3H3C2 3 1 4 1 5v14c0 1.1.9 2 2 2h18c1.1 0 2-.9 2-2V5c0-1-1-2-2-2zm0 16H3V5h18v14zM5 15h2v2H5zm0-4h2v2H5zm0-4h2v2H5zm4 8h6v2H9zm0-4h6v2H9zm0-4h6v2H9zm8 8h2v2h-2zm0-4h2v2h-2zm0-4h2v2h-2z"/></svg>
    Build Sprites
  </button>
  <div class="ctx-sep"></div>
  <button class="ctx-item" onclick="ctxCopyUrl()">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M3.9 12c0-1.71 1.39-3.1 3.1-3.1h4V7H7c-2.76 0-5 2.24-5 5s2.24 5 5 5h4v-1.9H7c-1.71 0-3.1-1.39-3.1-3.1zM8 13h8v-2H8v2zm9-6h-4v1.9h4c1.71 0 3.1 1.39 3.1 3.1s-1.39 3.1-3.1 3.1h-4V17h4c2.76 0 5-2.24 5-5s-2.24-5-5-5z"/></svg>
    Copy URL
  </button>
  <button class="ctx-item" onclick="ctxCopyVMPath()">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M20 6h-2.18c.07-.44.18-.88.18-1.34C18 2.54 15.6.12 12.66.12 10.94.12 9.38.96 8.4 2.28L7 4 5.6 2.28C4.62.96 3.06.12 1.34.12 -1.6.12-4 2.54-4 5.66c0 .46.11.9.18 1.34H-4v2h24V6zM20 19H4V8h16v11z"/></svg>
    Copy VM path
  </button>
  <div class="ctx-sep"></div>
  <button class="ctx-item danger" onclick="ctxDelete()">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg>
    Delete
  </button>
</div>

<!-- Hover video preview -->
<div class="hover-preview" id="hoverPreview">
  <div class="hover-preview-img" id="hoverPreviewImg"></div>
  <div class="hover-preview-bar">
    <div class="hover-preview-name" id="hoverPreviewName"></div>
  </div>
</div>

<!-- Sprite build notification tray -->
<div class="build-tray" id="buildTray"></div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
  let currentPath = '/';

  // ── Navigation ──────────────────────────────────────────────────
  function navigate(path) {
    currentPath = path;
    loadDirectory(path);
    updateBreadcrumb(path);
  }

  function updateBreadcrumb(path) {
    const bc = document.getElementById('breadcrumb');
    const parts = path.split('/').filter(Boolean);
    let html = `<span class="breadcrumb-item ${parts.length === 0 ? 'current' : ''}" onclick="navigate('/')">My Videos</span>`;
    let built = '';
    parts.forEach((part, i) => {
      built += '/' + part;
      const isCurrent = i === parts.length - 1;
      const captured = built;
      html += `<span class="breadcrumb-sep">›</span>`;
      html += `<span class="breadcrumb-item ${isCurrent ? 'current' : ''}" onclick="navigate('${captured}')">${escapeHtml(part)}</span>`;
    });
    bc.innerHTML = html;
  }

  async function loadDirectory(path) {
    const list = document.getElementById('fileList');
    list.innerHTML = '<div class="loading"><div class="spinner"></div> Loading…</div>';
    try {
      const res = await fetch(`/api/files?path=${encodeURIComponent(path)}`);
      if (res.status === 401) { window.location.href = '/login'; return; }
      const entries = await res.json();
      renderList(entries, path);
    } catch(e) {
      list.innerHTML = '<div class="empty-state">Failed to load directory.</div>';
    }
  }

  // ── Helpers ──────────────────────────────────────────────────────
  function formatSize(bytes) {
    if (!bytes) return '—';
    if (bytes < 1024) return bytes + ' B';
    if (bytes < 1024*1024) return (bytes/1024).toFixed(1) + ' KB';
    if (bytes < 1024*1024*1024) return (bytes/1024/1024).toFixed(1) + ' MB';
    return (bytes/1024/1024/1024).toFixed(2) + ' GB';
  }

  function formatDate(iso) {
    if (!iso) return '—';
    return new Date(iso).toLocaleDateString(undefined, { year: 'numeric', month: 'short', day: 'numeric' });
  }

  function escapeHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
  }

  function attrJson(val) {
    return JSON.stringify(val).replace(/"/g, '&quot;');
  }

  function encodedFilePath(path) {
    return path.split('/').map(encodeURIComponent).join('/');
  }

  function folderIcon() {
    return `<svg class="file-icon" width="20" height="20" viewBox="0 0 24 24" fill="#5f6368">
      <path d="M10 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2h-8l-2-2z"/>
    </svg>`;
  }

  function videoIcon() {
    return `<svg class="file-icon" width="20" height="20" viewBox="0 0 24 24" fill="#1a73e8">
      <path d="M18 4l2 4h-3l-2-4h-2l2 4h-3l-2-4H8l2 4H7L5 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V4h-4z"/>
    </svg>`;
  }

  // ── Render ────────────────────────────────────────────────────────
  function renderList(entries, path) {
    const list = document.getElementById('fileList');
    if (!entries || entries.length === 0) {
      list.innerHTML = '<div class="empty-state"><svg width="48" height="48" viewBox="0 0 24 24" fill="#dadce0"><path d="M20 6h-8l-2-2H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2zm0 12H4V8h16v10z"/></svg><span>This folder is empty</span></div>';
      return;
    }

    let html = '';
    if (path !== '/' && path !== '') {
      const parent = path.split('/').slice(0, -1).join('/') || '/';
      html += `<div class="file-row" onclick="navigate('${parent}')">
        <div class="file-name">
          <svg class="file-icon" width="20" height="20" viewBox="0 0 24 24" fill="#5f6368"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
          <span style="color:var(--text-secondary)">.. (go up)</span>
        </div>
        <div></div><div></div><div></div>
      </div>`;
    }

    entries.forEach(entry => {
      const safeName = escapeHtml(entry.name);
      const fileUrl = `/files${encodedFilePath(entry.path)}`;
      const potUrl = `potplayer://${window.location.origin}${fileUrl}`;
      const ctx = attrJson({ path: entry.path, name: entry.name, vmPath: entry.vmPath || '' });

      if (entry.isDir) {
        html += `<div class="file-row" onclick="navigate(${attrJson(entry.path)})">
          <div class="file-name">${folderIcon()}<span>${safeName}</span></div>
          <div class="file-date">${formatDate(entry.modTime)}</div>
          <div class="file-size">—</div>
          <div></div>
        </div>`;
      } else {
        html += `<div class="file-row" data-path="${escapeHtml(entry.path)}" data-name="${safeName}" data-has-preview="${entry.hasPreview}" onclick="openPlayer(${attrJson(entry.path)}, ${attrJson(entry.name)})">
          <div class="file-name">${videoIcon()}<span>${safeName}</span></div>
          <div class="file-date">${formatDate(entry.modTime)}</div>
          <div class="file-size">${formatSize(entry.size)}</div>
          <div class="row-actions">
            <a class="action-btn" title="Open in PotPlayer" href="${potUrl}" onclick="event.stopPropagation()">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
            </a>
            <a class="action-btn" title="Download" href="${fileUrl}" download="${safeName}" onclick="event.stopPropagation()">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg>
            </a>
            <button class="action-btn ${entry.hasSprites ? 'sprites-ready' : ''}" title="${entry.hasSprites ? 'Sprites built ✓' : 'Build sprites'}" onclick="rowBuildSprites(event, ${ctx})">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor"><path d="M21 3H3C2 3 1 4 1 5v14c0 1.1.9 2 2 2h18c1.1 0 2-.9 2-2V5c0-1-1-2-2-2zm0 16H3V5h18v14zM5 15h2v2H5zm0-4h2v2H5zm0-4h2v2H5zm4 8h6v2H9zm0-4h6v2H9zm0-4h6v2H9zm8 8h2v2h-2zm0-4h2v2h-2zm0-4h2v2h-2z"/></svg>
            </button>
            <button class="action-btn" title="More options" onclick="openMenu(event, ${ctx})">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor"><path d="M12 8c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zm0 2c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm0 6c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2z"/></svg>
            </button>
          </div>
        </div>`;
      }
    });

    list.innerHTML = html;
  }

  // ── Context menu ─────────────────────────────────────────────────
  let ctxEntry = null;

  function openMenu(event, entry) {
    event.stopPropagation();
    ctxEntry = entry;
    const menu = document.getElementById('ctxMenu');
    menu.classList.add('open');
    const rect = event.currentTarget.getBoundingClientRect();
    const menuH = menu.offsetHeight;
    const spaceBelow = window.innerHeight - rect.bottom;
    const top = spaceBelow < menuH + 8 ? rect.top - menuH - 4 : rect.bottom + 4;
    const left = Math.min(rect.left, window.innerWidth - menu.offsetWidth - 8);
    menu.style.top = top + 'px';
    menu.style.left = left + 'px';
  }

  function closeMenu() {
    document.getElementById('ctxMenu').classList.remove('open');
    ctxEntry = null;
  }

  document.addEventListener('click', () => closeMenu());

  function ctxEdit() {
    if (!ctxEntry) return;
    const path = ctxEntry.path;
    closeMenu();
    window.location.href = '/editor?path=' + encodeURIComponent(path);
  }

  // ── Hover preview ────────────────────────────────────────────────
  const preview = document.getElementById('hoverPreview');
  const previewImg = document.getElementById('hoverPreviewImg');
  const previewName = document.getElementById('hoverPreviewName');

  let previewCurrentPath = null;
  let previewPollTimer = null;
  let previewHideTimer = null;
  const isMobile = () => 'ontouchstart' in window || navigator.maxTouchPoints > 0;

  function positionPreview(e) {
    const pad = 12;
    const pw = 320, ph = 210;
    let left = e.clientX + pad;
    let top  = e.clientY - ph / 2;
    if (left + pw > window.innerWidth  - pad) left = e.clientX - pw - pad;
    if (top  + ph > window.innerHeight - pad) top  = window.innerHeight - ph - pad;
    if (top < pad) top = pad;
    preview.style.left = left + 'px';
    preview.style.top  = top  + 'px';
  }

  function showPreviewFor(path, name, hasPreview, e) {
    if (previewCurrentPath === path) {
      if (e) positionPreview(e);
      return;
    }
    clearTimeout(previewHideTimer);
    clearInterval(previewPollTimer);
    previewCurrentPath = path;
    previewName.textContent = name;
    previewImg.classList.remove('rolling');
    previewImg.style.backgroundImage = '';

    if (e) positionPreview(e);
    preview.classList.add('visible');

    if (hasPreview) {
      loadPreviewImage(path);
    } else {
      showPreviewLoading(0);
      triggerPreviewBuild(path);
    }
  }

  function loadPreviewImage(path) {
    const url = `/api/preview?path=${encodeURIComponent(path)}`;
    // Preload then display
    const img = new Image();
    img.onload = () => {
      if (previewCurrentPath !== path) return;
      previewImg.innerHTML = '';
      previewImg.style.backgroundImage = `url('${url}')`;
      previewImg.classList.add('rolling');
    };
    img.src = url;
  }

  function showPreviewLoading(pct) {
    previewImg.classList.remove('rolling');
    previewImg.style.backgroundImage = '';
    previewImg.innerHTML = `
      <div class="hover-preview-loading">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="#444"><path d="M21 3H3C2 3 1 4 1 5v14c0 1.1.9 2 2 2h18c1.1 0 2-.9 2-2V5c0-1-1-2-2-2zm0 16H3V5h18v14z"/></svg>
        <div>Generating preview… ${pct}%</div>
        <div class="hover-preview-prog"><div class="hover-preview-prog-fill" style="width:${pct}%"></div></div>
      </div>`;
  }

  async function triggerPreviewBuild(path) {
    try {
      await fetch(`/api/preview/build?path=${encodeURIComponent(path)}`, { method: 'POST' });
    } catch(e) { return; }

    previewPollTimer = setInterval(async () => {
      if (previewCurrentPath !== path) { clearInterval(previewPollTimer); return; }
      try {
        const res = await fetch(`/api/preview/progress?path=${encodeURIComponent(path)}`);
        const data = await res.json();
        if (previewCurrentPath !== path) { clearInterval(previewPollTimer); return; }
        if (data.done && !data.err) {
          clearInterval(previewPollTimer);
          loadPreviewImage(path);
        } else if (data.done && data.err) {
          clearInterval(previewPollTimer);
          previewImg.innerHTML = `<div class="hover-preview-loading" style="color:#f28b82">${escapeHtml(data.err)}</div>`;
        } else {
          showPreviewLoading(data.percent || 0);
        }
      } catch(e) { clearInterval(previewPollTimer); }
    }, 1500);
  }

  function hidePreview() {
    previewHideTimer = setTimeout(() => {
      preview.classList.remove('visible');
      previewCurrentPath = null;
      previewImg.classList.remove('rolling');
      clearInterval(previewPollTimer);
    }, 120);
  }

  // Event delegation on file list
  document.getElementById('fileList').addEventListener('mousemove', e => {
    const row = e.target.closest('.file-row[data-path]');
    if (!row) { hidePreview(); return; }
    clearTimeout(previewHideTimer);
    const path = row.dataset.path;
    const name = row.dataset.name;
    const hasPreview = row.dataset.hasPreview === 'true';
    showPreviewFor(path, name, hasPreview, e);
  });

  document.getElementById('fileList').addEventListener('mouseleave', () => hidePreview());

  // Mobile: touchstart shows preview, touchend hides after delay
  document.getElementById('fileList').addEventListener('touchstart', e => {
    const row = e.target.closest('.file-row[data-path]');
    if (!row) return;
    const path = row.dataset.path;
    const name = row.dataset.name;
    const hasPreview = row.dataset.hasPreview === 'true';
    // Position near center of screen on mobile
    const rect = row.getBoundingClientRect();
    const fakeEvt = { clientX: window.innerWidth / 2 - 160, clientY: rect.top - 210 };
    showPreviewFor(path, name, hasPreview, fakeEvt);
  }, { passive: true });

  document.getElementById('fileList').addEventListener('touchend', () => {
    setTimeout(() => hidePreview(), 2000);
  }, { passive: true });

  // ── Sprite build ──────────────────────────────────────────────────
  const buildPollers = {}; // relPath → intervalId

  function rowBuildSprites(event, entry) {
    event.stopPropagation();
    startBuild(entry.path, entry.name);
  }

  function ctxBuildSprites() {
    if (!ctxEntry) return;
    const { path, name } = ctxEntry;
    closeMenu();
    startBuild(path, name);
  }

  async function startBuild(path, name) {
    if (buildPollers[path]) { showToast('Already building — check the progress card'); return; }

    showBuildCard(path, name, 0, false, '');

    try {
      await fetch(`/api/sprite/build?path=${encodeURIComponent(path)}`, { method: 'POST' });
    } catch(e) {
      updateBuildCard(path, 0, true, e.message);
      return;
    }

    buildPollers[path] = setInterval(async () => {
      try {
        const res = await fetch(`/api/sprite/progress?path=${encodeURIComponent(path)}`);
        const data = await res.json();
        updateBuildCard(path, data.percent, data.done, data.err || '');
        if (data.done) {
          clearInterval(buildPollers[path]);
          delete buildPollers[path];
          if (!data.err) {
            setTimeout(() => removeBuildCard(path), 4000);
            loadDirectory(currentPath); // refresh row to show green sprite icon
          }
        }
      } catch(e) {
        updateBuildCard(path, 0, true, e.message);
        clearInterval(buildPollers[path]);
        delete buildPollers[path];
      }
    }, 1200);
  }

  function cardId(path) { return 'bc_' + btoa(path).replace(/[^a-zA-Z0-9]/g, ''); }

  function showBuildCard(path, name, percent, done, err) {
    const tray = document.getElementById('buildTray');
    const id = cardId(path);
    if (document.getElementById(id)) return;
    const card = document.createElement('div');
    card.className = 'build-card';
    card.id = id;
    card.dataset.name = name;
    card.innerHTML = buildCardHTML(name, percent, done, err);
    tray.appendChild(card);
  }

  function updateBuildCard(path, percent, done, err) {
    const card = document.getElementById(cardId(path));
    if (!card) return;
    card.innerHTML = buildCardHTML(card.dataset.name || '', percent, done, err);
  }

  function removeBuildCard(path) {
    const card = document.getElementById(cardId(path));
    if (card) card.remove();
  }

  function buildCardHTML(name, percent, done, err) {
    const pct = Math.min(100, Math.max(0, percent));
    const cls = err ? 'error' : done ? 'done' : '';
    const label = err ? err : done ? 'Done — sprites cached' : 'Generating sprite sheets…';
    const pctLabel = err ? 'Error' : done ? '100%' : pct + '%';
    return `
      <div class="build-card-top">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="var(--text-secondary)"><path d="M21 3H3C2 3 1 4 1 5v14c0 1.1.9 2 2 2h18c1.1 0 2-.9 2-2V5c0-1-1-2-2-2zm0 16H3V5h18v14z"/></svg>
        <span class="build-card-name">${escapeHtml(name)}</span>
        <span class="build-card-pct ${cls}">${pctLabel}</span>
      </div>
      <div class="build-bar-track"><div class="build-bar-fill ${cls}" style="width:${pct}%"></div></div>
      <div class="build-card-label">${escapeHtml(label)}</div>`;
  }

  function ctxCopyUrl() {
    if (!ctxEntry) return;
    const url = `${window.location.origin}/files${encodedFilePath(ctxEntry.path)}`;
    copyText(url, 'URL copied');
    closeMenu();
  }

  function ctxCopyVMPath() {
    if (!ctxEntry) return;
    copyText(ctxEntry.vmPath || ctxEntry.path, 'VM path copied');
    closeMenu();
  }

  async function ctxDelete() {
    if (!ctxEntry) return;
    const entry = ctxEntry;
    closeMenu();
    if (!confirm(`Delete "${entry.name}"?\n\nThis cannot be undone.`)) return;
    try {
      const res = await fetch(`/api/files?path=${encodeURIComponent(entry.path)}`, { method: 'DELETE' });
      if (!res.ok) throw new Error(await res.text());
      showToast(`"${entry.name}" deleted`);
      loadDirectory(currentPath);
    } catch(e) {
      alert('Delete failed: ' + e.message);
    }
  }

  // ── Toast ─────────────────────────────────────────────────────────
  let toastTimer;
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.remove('show'), 2200);
  }

  function copyText(text, successMsg) {
    const msg = successMsg || 'Copied!';
    if (navigator.clipboard && window.isSecureContext) {
      navigator.clipboard.writeText(text).then(() => showToast(msg));
    } else {
      const ta = document.createElement('textarea');
      ta.value = text;
      ta.style.cssText = 'position:fixed;opacity:0';
      document.body.appendChild(ta);
      ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
      showToast(msg);
    }
  }

  // ── Player ────────────────────────────────────────────────────────
  let shakaPlayer = null;

  async function openPlayer(path, name) {
    document.getElementById('playerTitle').textContent = name;
    document.getElementById('playerError').style.display = 'none';
    document.getElementById('playerOverlay').classList.add('open');
    if (!shakaPlayer) {
      showPlayerError({ message: 'Player still loading, please try again.' });
      return;
    }
    try {
      await shakaPlayer.load(`/files${path}`);
      document.getElementById('videoEl').play().catch(() => {});
    } catch (e) {
      if (e && e.code === 7000) return;
      showPlayerError(e);
    }
  }

  async function closePlayer() {
    document.getElementById('playerOverlay').classList.remove('open');
    document.getElementById('videoEl').pause();
    if (shakaPlayer) await shakaPlayer.unload();
  }

  function showPlayerError(e) {
    const bar = document.getElementById('playerError');
    const msg = document.getElementById('playerErrorMsg');
    if (e && e.code) {
      msg.textContent = `Playback error (code ${e.code}): ${e.message || 'unsupported format or network issue'}`;
    } else {
      msg.textContent = e ? (e.message || String(e)) : 'Unknown error';
    }
    bar.style.display = 'flex';
  }

  document.getElementById('playerOverlay').addEventListener('click', function(e) {
    if (e.target === this) closePlayer();
  });

  document.addEventListener('keydown', e => {
    const video = document.getElementById('videoEl');
    const open = document.getElementById('playerOverlay').classList.contains('open');
    if (e.key === 'Escape') { closeMenu(); if (open) closePlayer(); return; }
    if (!open) return;
    switch (e.key) {
      case 'ArrowRight': e.preventDefault(); video.currentTime += 5;  break;
      case 'ArrowLeft':  e.preventDefault(); video.currentTime -= 5;  break;
      case 'ArrowUp':    e.preventDefault(); video.volume = Math.min(1, video.volume + 0.1); break;
      case 'ArrowDown':  e.preventDefault(); video.volume = Math.max(0, video.volume - 0.1); break;
      case ' ':          e.preventDefault(); video.paused ? video.play() : video.pause(); break;
    }
  });

  // ── Generate All Previews ─────────────────────────────────────────
  let genAllPoller = null;

  async function startGenerateAll() {
    if (genAllPoller) return; // already running
    try {
      const res = await fetch('/api/preview/build-all', { method: 'POST' });
      const data = await res.json();
      updateGenAllUI(data);
      if (data.running || (data.total > 0 && data.done < data.total)) {
        pollGenerateAll();
      }
    } catch(e) {
      document.getElementById('genAllStatus').textContent = 'Error: ' + e.message;
    }
  }

  function pollGenerateAll() {
    genAllPoller = setInterval(async () => {
      try {
        const res = await fetch('/api/preview/build-all');
        const data = await res.json();
        updateGenAllUI(data);
        if (!data.running) {
          clearInterval(genAllPoller);
          genAllPoller = null;
          loadDirectory(currentPath); // refresh to show new hasPreview flags
        }
      } catch(e) {
        clearInterval(genAllPoller);
        genAllPoller = null;
      }
    }, 2000);
  }

  function updateGenAllUI(data) {
    const status = document.getElementById('genAllStatus');
    const track  = document.getElementById('genAllProgTrack');
    const fill   = document.getElementById('genAllProgFill');

    if (!data.running && data.total === 0) {
      status.textContent = 'All videos';
      track.style.display = 'none';
      return;
    }
    track.style.display = 'block';
    if (data.running) {
      const name = data.current ? data.current : '…';
      status.textContent = `${data.done} / ${data.total} — ${name}`;
      const pct = data.total > 0 ? (data.done / data.total * 100) : 0;
      fill.style.width = pct + '%';
      fill.classList.remove('done');
    } else {
      status.textContent = `Done — ${data.done} previews built`;
      fill.style.width = '100%';
      fill.classList.add('done');
    }
  }

  // Check if a bulk job is already running on page load
  (async () => {
    try {
      const res = await fetch('/api/preview/build-all');
      const data = await res.json();
      updateGenAllUI(data);
      if (data.running) pollGenerateAll();
    } catch(e) {}
  })();

  navigate('/');
</script>

<script src="https://cdn.jsdelivr.net/npm/shaka-player/dist/shaka-player.compiled.js"></script>
<script>
  (async () => {
    shaka.polyfill.installAll();
    const video = document.getElementById('videoEl');
    shakaPlayer = new shaka.Player();
    await shakaPlayer.attach(video);
    shakaPlayer.addEventListener('error', e => {
      if (e.detail && e.detail.code !== 7000) showPlayerError(e.detail);
    });
  })();
</script>
</body>
</html>
