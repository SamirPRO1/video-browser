<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Video Browser</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f8f9fa;
    --surface: #ffffff;
    --border: #e0e0e0;
    --text: #202124;
    --text-secondary: #5f6368;
    --accent: #1a73e8;
    --accent-hover: #1557b0;
    --hover-bg: #f1f3f4;
    --danger: #d93025;
    --danger-hover: #b31412;
    --row-height: 44px;
    --radius: 8px;
    --shadow: 0 1px 3px rgba(0,0,0,0.12), 0 1px 2px rgba(0,0,0,0.08);
  }

  body {
    font-family: 'Google Sans', Roboto, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* Top bar */
  .topbar {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    height: 64px;
    display: flex;
    align-items: center;
    gap: 16px;
    flex-shrink: 0;
    box-shadow: var(--shadow);
    z-index: 10;
  }
  .topbar-logo {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 20px;
    font-weight: 500;
    color: var(--text);
    cursor: pointer;
    flex: 1;
  }
  .topbar-logo svg { color: var(--accent); }

  .topbar-logout {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 8px 14px;
    border: 1px solid var(--border);
    border-radius: 20px;
    background: none;
    color: var(--text-secondary);
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.15s, color 0.15s;
    text-decoration: none;
  }
  .topbar-logout:hover { background: var(--hover-bg); color: var(--text); }

  /* Layout */
  .layout {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* Sidebar */
  .sidebar {
    width: 256px;
    background: var(--surface);
    border-right: 1px solid var(--border);
    padding: 16px 0;
    flex-shrink: 0;
    overflow-y: auto;
  }
  .sidebar-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 16px;
    cursor: pointer;
    border-radius: 0 24px 24px 0;
    margin-right: 16px;
    font-size: 14px;
    font-weight: 500;
    color: var(--text);
    transition: background 0.15s;
  }
  .sidebar-item:hover { background: var(--hover-bg); }
  .sidebar-item.active { background: #e8f0fe; color: var(--accent); }
  .sidebar-item svg { opacity: 0.7; }

  .sidebar-section {
    padding: 8px 16px 4px;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.6px;
    color: var(--text-secondary);
    margin-top: 8px;
  }
  .sidebar-action {
    display: flex;
    flex-direction: column;
    gap: 5px;
    padding: 8px 16px;
    margin-right: 16px;
    border-radius: 0 24px 24px 0;
    cursor: pointer;
    transition: background 0.15s;
  }
  .sidebar-action:hover { background: var(--hover-bg); }
  .sidebar-action-top {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 13px;
    font-weight: 500;
    color: var(--text);
  }
  .sidebar-action-top svg { opacity: 0.7; flex-shrink: 0; }
  .sidebar-action-sub {
    font-size: 11px;
    color: var(--text-secondary);
    padding-left: 28px;
  }
  .sidebar-prog-track {
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
    margin-left: 28px;
  }
  .sidebar-prog-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 2px;
    transition: width 0.5s;
  }
  .sidebar-prog-fill.done { background: #1e8e3e; }

  /* Sprite settings panel */
  .sprite-settings {
    padding: 0 16px 8px;
    display: none;
  }
  .sprite-settings.open { display: block; }
  .settings-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 5px 0;
    font-size: 12px;
    color: var(--text);
  }
  .settings-row label { color: var(--text-secondary); }
  .settings-row select {
    font-size: 12px;
    background: var(--hover-bg);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 3px 6px;
    color: var(--text);
    cursor: pointer;
  }
  .settings-toggle {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 6px 16px;
    font-size: 12px;
    color: var(--text-secondary);
    cursor: pointer;
    user-select: none;
  }
  .settings-toggle:hover { color: var(--text); }
  .settings-toggle svg { transition: transform 0.2s; }
  .settings-toggle.open svg { transform: rotate(90deg); }

  /* Sprite queue */
  .sprite-queue { padding: 0 0 8px; }
  .queue-item {
    display: flex;
    flex-direction: column;
    gap: 4px;
    padding: 7px 16px;
    border-bottom: 1px solid var(--border);
    position: relative;
  }
  .queue-item:last-child { border-bottom: none; }
  .queue-item-top {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: var(--text);
  }
  .queue-item-name {
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .queue-item-pct {
    font-size: 11px;
    font-variant-numeric: tabular-nums;
    color: var(--accent);
    flex-shrink: 0;
  }
  .queue-item-pct.done  { color: #1e8e3e; }
  .queue-item-pct.error { color: var(--danger); }
  .queue-bar { height: 2px; background: var(--border); border-radius: 1px; overflow: hidden; }
  .queue-bar-fill { height: 100%; background: var(--accent); border-radius: 1px; transition: width 0.4s; }
  .queue-bar-fill.done  { background: #1e8e3e; }
  .queue-bar-fill.error { background: var(--danger); }
  .queue-dismiss {
    position: absolute;
    top: 6px; right: 10px;
    font-size: 14px;
    color: var(--text-secondary);
    cursor: pointer;
    line-height: 1;
    display: none;
  }
  .queue-item:hover .queue-dismiss { display: block; }
  .queue-empty {
    padding: 6px 16px;
    font-size: 12px;
    color: var(--text-secondary);
    font-style: italic;
  }
  .queue-type {
    font-size: 9px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.4px;
    padding: 1px 5px;
    border-radius: 3px;
    flex-shrink: 0;
  }
  .queue-type.sprite  { background: #e8f0fe; color: var(--accent); }
  .queue-type.preview { background: #fce8e6; color: #c5221f; }
  .queue-eta {
    font-size: 10px;
    color: var(--text-secondary);
    padding-left: 0;
    font-variant-numeric: tabular-nums;
  }

  /* Main content */
  .main {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* Breadcrumb */
  .breadcrumb {
    padding: 12px 24px;
    display: flex;
    align-items: center;
    gap: 4px;
    font-size: 14px;
    flex-shrink: 0;
  }
  .breadcrumb-item {
    color: var(--accent);
    cursor: pointer;
    padding: 4px 6px;
    border-radius: 4px;
    transition: background 0.15s;
    white-space: nowrap;
  }
  .breadcrumb-item:hover { background: var(--hover-bg); }
  .breadcrumb-item.current {
    color: var(--text);
    cursor: default;
    font-weight: 500;
  }
  .breadcrumb-item.current:hover { background: none; }
  .breadcrumb-sep { color: var(--text-secondary); user-select: none; }

  /* File list header */
  .list-header {
    display: grid;
    grid-template-columns: 1fr 140px 100px 128px;
    padding: 0 24px;
    height: 36px;
    align-items: center;
    border-bottom: 1px solid var(--border);
    font-size: 12px;
    font-weight: 500;
    color: var(--text-secondary);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    flex-shrink: 0;
  }
  .list-header-col {
    display: flex;
    align-items: center;
    gap: 4px;
    cursor: pointer;
    user-select: none;
    white-space: nowrap;
  }
  .list-header-col:hover { color: var(--text); }
  .list-header-col.active { color: var(--accent); }
  .sort-arrow { font-size: 10px; opacity: 0.7; }

  /* Summary bar */
  .dir-summary {
    padding: 4px 24px;
    font-size: 12px;
    color: var(--text-secondary);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    display: flex;
    gap: 16px;
  }
  .dir-summary span { white-space: nowrap; }

  /* File list */
  .file-list {
    flex: 1;
    overflow-y: auto;
    padding: 8px 0;
  }
  .file-row {
    display: grid;
    grid-template-columns: 1fr 140px 100px 128px;
    padding: 0 24px;
    height: var(--row-height);
    align-items: center;
    cursor: pointer;
    transition: background 0.1s;
    font-size: 14px;
  }
  .file-row:hover { background: var(--hover-bg); }
  .file-row:active { background: #e8f0fe; }
  .file-name {
    display: flex;
    align-items: center;
    gap: 12px;
    overflow: hidden;
  }
  .file-name span {
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .file-icon { flex-shrink: 0; }
  .file-size { color: var(--text-secondary); font-size: 13px; }
  .file-date { color: var(--text-secondary); font-size: 13px; }

  .row-actions {
    display: flex;
    align-items: center;
    gap: 2px;
    opacity: 0;
    transition: opacity 0.15s;
    justify-content: flex-end;
  }
  .file-row:hover .row-actions { opacity: 1; }

  .action-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 28px;
    height: 28px;
    border-radius: 50%;
    border: none;
    background: none;
    color: var(--text-secondary);
    cursor: pointer;
    transition: background 0.15s, color 0.15s;
    flex-shrink: 0;
    text-decoration: none;
  }
  .action-btn:hover { background: var(--border); color: var(--accent); }
  .action-btn.danger:hover { background: #fce8e6; color: var(--danger); }
  .action-btn.sprites-ready { color: #1e8e3e; }
  .action-btn.sprites-ready:hover { background: #e6f4ea; color: #137333; }

  .broken-badge {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 16px;
    height: 16px;
    border-radius: 50%;
    background: #e8453c;
    color: #fff;
    font-size: 10px;
    font-weight: 700;
    flex-shrink: 0;
    margin-left: -4px;
    margin-right: 4px;
    cursor: default;
  }

  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    height: 200px;
    color: var(--text-secondary);
  }

  /* Video player overlay */
  .player-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    z-index: 100;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s;
  }
  .player-overlay.open {
    opacity: 1;
    pointer-events: all;
  }
  .player-container {
    width: 100%;
    max-width: 1100px;
    background: #000;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 24px 64px rgba(0,0,0,0.6);
    transform: scale(0.96);
    transition: transform 0.2s;
  }
  .player-overlay.open .player-container { transform: scale(1); }

  .player-topbar {
    background: #1a1a1a;
    padding: 12px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
  }
  .player-title {
    color: #fff;
    font-size: 15px;
    font-weight: 500;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .player-close {
    background: none;
    border: none;
    color: #aaa;
    cursor: pointer;
    padding: 4px;
    border-radius: 4px;
    display: flex;
    align-items: center;
    transition: color 0.15s;
    flex-shrink: 0;
  }
  .player-close:hover { color: #fff; }

  video {
    width: 100%;
    display: block;
    max-height: 75vh;
    background: #000;
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 8px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #dadce0; border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: #bdc1c6; }

  .loading {
    display: flex; align-items: center; justify-content: center;
    height: 120px; color: var(--text-secondary); gap: 12px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .spinner {
    width: 20px; height: 20px; border: 2px solid var(--border);
    border-top-color: var(--accent); border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }

  /* Player error banner */
  .player-error {
    display: none;
    align-items: center;
    gap: 10px;
    background: #3c1010;
    color: #f28b82;
    padding: 14px 20px;
    font-size: 14px;
  }
  .player-error svg { flex-shrink: 0; }

  /* Context menu */
  .ctx-menu {
    position: fixed;
    z-index: 200;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.14), 0 1px 4px rgba(0,0,0,0.08);
    padding: 4px 0;
    min-width: 192px;
    display: none;
  }
  .ctx-menu.open { display: block; }
  .ctx-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 9px 16px;
    font-size: 14px;
    color: var(--text);
    cursor: pointer;
    border: none;
    background: none;
    width: 100%;
    text-align: left;
    transition: background 0.1s;
  }
  .ctx-item:hover { background: var(--hover-bg); }
  .ctx-item.danger { color: var(--danger); }
  .ctx-item.danger:hover { background: #fce8e6; }
  .ctx-item svg { flex-shrink: 0; opacity: 0.75; }
  .ctx-sep {
    height: 1px;
    background: var(--border);
    margin: 4px 0;
  }

  /* Hover preview */
  .hover-preview {
    position: fixed;
    z-index: 160;
    width: 320px;
    background: #000;
    border-radius: 10px;
    overflow: hidden;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5), 0 2px 8px rgba(0,0,0,0.3);
    pointer-events: none;
    opacity: 0;
    transform: scale(0.95);
    transition: opacity 0.15s, transform 0.15s;
  }
  .hover-preview.visible {
    opacity: 1;
    transform: scale(1);
  }
  .hover-preview-img {
    width: 320px;
    height: 180px;
    background-color: #111;
    background-repeat: no-repeat;
    background-size: 320px 27000px; /* 150 frames × 180px */
  }
  @keyframes preview-roll {
    to { background-position-y: var(--strip-h, -27000px); }
  }
  .hover-preview-img.rolling {
    animation: preview-roll 10s steps(150) infinite;
  }
  .hover-preview-playbar {
    height: 3px;
    background: rgba(255,255,255,0.08);
    position: relative;
    overflow: hidden;
    flex-shrink: 0;
  }
  .hover-preview-playbar-fill {
    position: absolute;
    top: 0; left: 0; height: 100%;
    width: 0%;
    background: var(--accent);
    border-radius: 0 2px 2px 0;
  }
  @keyframes preview-progress {
    from { width: 0%; }
    to   { width: 100%; }
  }
  .hover-preview-bar {
    background: #1a1a1a;
    padding: 8px 12px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .hover-preview-name {
    font-size: 12px;
    color: #ccc;
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .hover-preview-loading {
    width: 320px;
    height: 180px;
    background: #111;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
    color: #666;
    font-size: 12px;
  }
  .hover-preview-prog {
    width: 180px;
    height: 3px;
    background: #333;
    border-radius: 2px;
    overflow: hidden;
  }
  .hover-preview-prog-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 2px;
    transition: width 0.4s;
  }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 28px;
    left: 50%;
    transform: translateX(-50%) translateY(8px);
    background: #333;
    color: #fff;
    padding: 10px 22px;
    border-radius: 24px;
    font-size: 14px;
    opacity: 0;
    transition: opacity 0.18s, transform 0.18s;
    pointer-events: none;
    z-index: 300;
    white-space: nowrap;
  }
  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-logo" onclick="navigate('/')">
    <svg width="28" height="28" viewBox="0 0 24 24" fill="currentColor">
      <path d="M4 6H2v14c0 1.1.9 2 2 2h14v-2H4V6zm16-4H8c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-8 12.5v-9l6 4.5-6 4.5z"/>
    </svg>
    Video Browser
  </div>
  <a href="/logout" class="topbar-logout">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
      <path d="M17 7l-1.41 1.41L18.17 11H8v2h10.17l-2.58 2.58L17 17l5-5-5-5zM4 5h8V3H4c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h8v-2H4V5z"/>
    </svg>
    Sign out
  </a>
</div>

<div class="layout">
  <div class="sidebar">
    <div class="sidebar-item active" onclick="navigate('/')">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
        <path d="M10 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2h-8l-2-2z"/>
      </svg>
      All Videos
    </div>

    <!-- Previews -->
    <div class="sidebar-section">Previews</div>
    <div class="settings-toggle" id="previewSettingsToggle" onclick="togglePreviewSettings()">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><path d="M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z"/></svg>
      Settings
    </div>
    <div class="sprite-settings" id="previewSettings">
      <div class="settings-row">
        <label>Resolution</label>
        <select id="cfgPreviewRes" onchange="savePreviewSettings()">
          <option value="160x90">160×90 (fast)</option>
          <option value="320x180" selected>320×180</option>
          <option value="480x270">480×270 (quality)</option>
        </select>
      </div>
      <div class="settings-row">
        <label>Frames</label>
        <select id="cfgPreviewFrames" onchange="savePreviewSettings()">
          <option value="60">60 frames</option>
          <option value="100">100 frames</option>
          <option value="150" selected>150 frames</option>
          <option value="200">200 frames</option>
        </select>
      </div>
      <div class="settings-row">
        <label>Quality</label>
        <select id="cfgPreviewQuality" onchange="savePreviewSettings()">
          <option value="2">High</option>
          <option value="4" selected>Balanced</option>
          <option value="7">Fast</option>
        </select>
      </div>
      <div class="settings-row">
        <label>Loop duration</label>
        <select id="cfgPreviewDuration" onchange="savePreviewSettings()">
          <option value="10" selected>10 sec</option>
          <option value="15">15 sec</option>
          <option value="20">20 sec</option>
          <option value="30">30 sec</option>
        </select>
      </div>
    </div>
    <div class="sidebar-action" onclick="startGenerateAll()">
      <div class="sidebar-action-top">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M4 6H2v14c0 1.1.9 2 2 2h14v-2H4V6zm16-4H8c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-8 12.5v-9l6 4.5-6 4.5z"/></svg>
        Generate All
      </div>
      <div class="sidebar-action-sub" id="genAllStatus">All videos</div>
      <div class="sidebar-prog-track" id="genAllProgTrack" style="display:none">
        <div class="sidebar-prog-fill" id="genAllProgFill" style="width:0%"></div>
      </div>
    </div>

    <!-- Sprites -->
    <div class="sidebar-section">Sprites</div>

    <!-- Settings toggle -->
    <div class="settings-toggle" id="settingsToggle" onclick="toggleSettings()">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><path d="M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z"/></svg>
      Settings
    </div>
    <div class="sprite-settings" id="spriteSettings">
      <div class="settings-row">
        <label>Resolution</label>
        <select id="cfgRes" onchange="saveSettings()">
          <option value="160x90">160×90 (fast)</option>
          <option value="240x135">240×135</option>
          <option value="320x180">320×180 (quality)</option>
        </select>
      </div>
      <div class="settings-row">
        <label>Interval</label>

  <div class="main">

<script>
  let currentPath = '/';
  let currentEntries = [];
  let sortCol = 'name';
  let sortDir = 1; // 1 = asc, -1 = desc

  // ── Navigation ──────────────────────────────────────────────────
  function navigate(path) {
    currentPath = path;
    loadDirectory(path);
    updateBreadcrumb(path);
    const folderName = path === '/' || path === '' ? 'All Videos' : path.split('/').filter(Boolean).pop();
    document.getElementById('buildFolderLabel').textContent = folderName;
  }

  function updateBreadcrumb(path) {
    const bc = document.getElementById('breadcrumb');
    const parts = path.split('/').filter(Boolean);
    let html = `<span class="breadcrumb-item ${parts.length === 0 ? 'current' : ''}" onclick="navigate('/')">My Videos</span>`;
    let built = '';
    parts.forEach((part, i) => {
      built += '/' + part;
      const isCurrent = i === parts.length - 1;
      const captured = built;
      html += `<span class="breadcrumb-sep">›</span>`;
      html += `<span class="breadcrumb-item ${isCurrent ? 'current' : ''}" onclick="navigate('${captured}')">${escapeHtml(part)}</span>`;
    });
    bc.innerHTML = html;
  }

  async function loadDirectory(path) {
    const list = document.getElementById('fileList');
    list.innerHTML = '<div class="loading"><div class="spinner"></div> Loading…</div>';
    try {
      const res = await fetch(`/api/files?path=${encodeURIComponent(path)}`);
      if (res.status === 401) { window.location.href = '/login'; return; }
      currentEntries = await res.json();
      renderSummary(currentEntries, path);
      renderList(sortEntries(currentEntries), path);
    } catch(e) {
      list.innerHTML = '<div class="empty-state">Failed to load directory.</div>';
    }
  }

  // ── Helpers ──────────────────────────────────────────────────────
  function formatSize(bytes) {
    if (!bytes) return '—';
    if (bytes < 1024) return bytes + ' B';
    if (bytes < 1024*1024) return (bytes/1024).toFixed(1) + ' KB';
    if (bytes < 1024*1024*1024) return (bytes/1024/1024).toFixed(1) + ' MB';
    return (bytes/1024/1024/1024).toFixed(2) + ' GB';
  }

  function formatDate(iso) {
    if (!iso) return '—';
    return new Date(iso).toLocaleDateString(undefined, { year: 'numeric', month: 'short', day: 'numeric' });
  }

  // ── Sort ────────────────────────────────────────────────────────
  function setSort(col) {
    if (sortCol === col) {
      sortDir = -sortDir;
    } else {
      sortCol = col;
      sortDir = col === 'size' ? -1 : 1; // size defaults to desc (largest first)
    }
    updateSortHeaders();
    renderList(sortEntries(currentEntries), currentPath);
  }

  function updateSortHeaders() {
    ['name','date','size'].forEach(c => {
      const hdr = document.getElementById('hdr' + c.charAt(0).toUpperCase() + c.slice(1));
      const arr = document.getElementById('arr' + c.charAt(0).toUpperCase() + c.slice(1));
      if (!hdr || !arr) return;
      hdr.classList.toggle('active', c === sortCol);
      arr.textContent = c === sortCol ? (sortDir === 1 ? '▲' : '▼') : '';
    });
  }

  function sortEntries(entries) {
    const dirs  = entries.filter(e => e.isDir);
    const files = entries.filter(e => !e.isDir);
    const cmp = (a, b) => {
      let va, vb;
      if (sortCol === 'name') {
        va = a.name.toLowerCase(); vb = b.name.toLowerCase();
        return sortDir * va.localeCompare(vb);
      } else if (sortCol === 'date') {
        va = a.modTime || ''; vb = b.modTime || '';
      } else {
        va = a.size || 0; vb = b.size || 0;
      }
      return sortDir * (va < vb ? -1 : va > vb ? 1 : 0);
    };
    return [...dirs.sort(cmp), ...files.sort(cmp)];
  }

  // ── Summary bar ─────────────────────────────────────────────────
  function renderSummary(entries, path) {
    const bar = document.getElementById('dirSummary');
    if (!entries || path !== currentPath) { bar.innerHTML = ''; return; }
    const folders = entries.filter(e => e.isDir).length;
    const files   = entries.filter(e => !e.isDir).length;
    const total   = entries.reduce((s, e) => s + (e.size || 0), 0);
    const parts = [];
    if (folders) parts.push(`<span>${folders} folder${folders !== 1 ? 's' : ''}</span>`);
    if (files)   parts.push(`<span>${files} video${files !== 1 ? 's' : ''}</span>`);
    if (total)   parts.push(`<span>Total: <strong>${formatSize(total)}</strong></span>`);
    bar.innerHTML = parts.join('<span style="color:var(--border)">·</span>');
  }

  function escapeHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
  }

  function attrJson(val) {
    return JSON.stringify(val).replace(/"/g, '&quot;');
  }

  function encodedFilePath(path) {
    return path.split('/').map(encodeURIComponent).join('/');
  }

  function folderIcon() {
    return `<svg class="file-icon" width="20" height="20" viewBox="0 0 24 24" fill="#5f6368">
      <path d="M10 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2h-8l-2-2z"/>
    </svg>`;
  }

  function videoIcon() {
    return `<svg class="file-icon" width="20" height="20" viewBox="0 0 24 24" fill="#1a73e8">
      <path d="M18 4l2 4h-3l-2-4h-2l2 4h-3l-2-4H8l2 4H7L5 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V4h-4z"/>
    </svg>`;
  }

  // ── Render ────────────────────────────────────────────────────────
  function renderList(entries, path) {
    const list = document.getElementById('fileList');
    if (!entries || entries.length === 0) {
      list.innerHTML = '<div class="empty-state"><svg width="48" height="48" viewBox="0 0 24 24" fill="#dadce0"><path d="M20 6h-8l-2-2H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2zm0 12H4V8h16v10z"/></svg><span>This folder is empty</span></div>';
      return;
    }

    let html = '';
    if (path !== '/' && path !== '') {
      const parent = path.split('/').slice(0, -1).join('/') || '/';
      html += `<div class="file-row" onclick="navigate('${parent}')">
        <div class="file-name">
          <svg class="file-icon" width="20" height="20" viewBox="0 0 24 24" fill="#5f6368"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
          <span style="color:var(--text-secondary)">.. (go up)</span>
        </div>
        <div></div><div></div><div></div>
      </div>`;
    }

    entries.forEach(entry => {
      const safeName = escapeHtml(entry.name);
      const fileUrl = `/files${encodedFilePath(entry.path)}`;
      const potUrl = `potplayer://${window.location.origin}${fileUrl}`;
      const ctx = attrJson({ path: entry.path, name: entry.name, vmPath: entry.vmPath || '', broken: entry.broken || false });

      if (entry.isDir) {
        html += `<div class="file-row" onclick="navigate(${attrJson(entry.path)})">
          <div class="file-name">${folderIcon()}<span>${safeName}</span></div>
          <div class="file-date">${formatDate(entry.modTime)}</div>
          <div class="file-size">${entry.size ? formatSize(entry.size) : '—'}</div>
          <div></div>
        </div>`;
      } else {
        const brokenBadge = entry.broken ? `<span class="broken-badge" title="Corrupt file — moov atom not found">!</span>` : '';
        html += `<div class="file-row" data-path="${escapeHtml(entry.path)}" data-name="${safeName}" data-has-preview="${entry.hasPreview && !entry.broken}" data-broken="${entry.broken}" onclick="${entry.broken ? 'void(0)' : `openPlayer(${attrJson(entry.path)}, ${attrJson(entry.name)})`}">
          <div class="file-name">${videoIcon()}${brokenBadge}<span style="${entry.broken ? 'color:var(--text-secondary);text-decoration:line-through' : ''}">${safeName}</span></div>
          <div class="file-date">${formatDate(entry.modTime)}</div>
          <div class="file-size">${formatSize(entry.size)}</div>
          <div class="row-actions">
            <a class="action-btn" title="Open in PotPlayer" href="${potUrl}" onclick="event.stopPropagation()">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
            </a>
            <a class="action-btn" title="Download" href="${fileUrl}" download="${safeName}" onclick="event.stopPropagation()">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg>
            </a>
            <button class="action-btn ${entry.hasSprites ? 'sprites-ready' : ''}" title="${entry.hasSprites ? 'Sprites built ✓' : 'Build sprites'}" onclick="rowBuildSprites(event, ${ctx})">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor"><path d="M21 3H3C2 3 1 4 1 5v14c0 1.1.9 2 2 2h18c1.1 0 2-.9 2-2V5c0-1-1-2-2-2zm0 16H3V5h18v14zM5 15h2v2H5zm0-4h2v2H5zm0-4h2v2H5zm4 8h6v2H9zm0-4h6v2H9zm0-4h6v2H9zm8 8h2v2h-2zm0-4h2v2h-2zm0-4h2v2h-2z"/></svg>
            </button>
            <button class="action-btn" title="More options" onclick="openMenu(event, ${ctx})">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor"><path d="M12 8c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zm0 2c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm0 6c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2z"/></svg>
            </button>
          </div>
        </div>`;
      }
    });

    list.innerHTML = html;
  }

  // ── Context menu ─────────────────────────────────────────────────
  let ctxEntry = null;

  function openMenu(event, entry) {
    event.stopPropagation();
    ctxEntry = entry;
    const menu = document.getElementById('ctxMenu');
    document.getElementById('ctxRecoverBtn').style.display = entry.broken ? 'flex' : 'none';
    menu.classList.add('open');
    const rect = event.currentTarget.getBoundingClientRect();
    const menuH = menu.offsetHeight;
    const spaceBelow = window.innerHeight - rect.bottom;
    const top = spaceBelow < menuH + 8 ? rect.top - menuH - 4 : rect.bottom + 4;
    const left = Math.min(rect.left, window.innerWidth - menu.offsetWidth - 8);
    menu.style.top = top + 'px';
    menu.style.left = left + 'px';
  }

  function closeMenu() {
    document.getElementById('ctxMenu').classList.remove('open');
    ctxEntry = null;
  }

  document.addEventListener('click', () => closeMenu());

  function ctxEdit() {
    if (!ctxEntry) return;
    const path = ctxEntry.path;
    closeMenu();
    window.location.href = '/editor?path=' + encodeURIComponent(path);
  }

  // ── Hover preview ────────────────────────────────────────────────
  const preview = document.getElementById('hoverPreview');
  const previewImg = document.getElementById('hoverPreviewImg');
  const previewName = document.getElementById('hoverPreviewName');

  let previewCurrentPath = null;
  let previewPollTimer = null;
  let previewHideTimer = null;
  let previewShowTimer = null;
  const isMobile = () => 'ontouchstart' in window || navigator.maxTouchPoints > 0;

  function positionPreviewAtRow(row) {
    const pad = 12;
    const pw = preview.offsetWidth  || 320;
    const ph = preview.offsetHeight || 210;
    const rect = row.getBoundingClientRect();
    // Try to appear to the left of the file list so it never overlaps the row actions
    let left = rect.left - pw - pad;
    if (left < pad) left = rect.right + pad; // flip right if no room on left
    if (left + pw > window.innerWidth - pad) left = window.innerWidth - pw - pad;
    let top = rect.top + (rect.height / 2) - (ph / 2);
    if (top + ph > window.innerHeight - pad) top = window.innerHeight - ph - pad;
    if (top < pad) top = pad;
    preview.style.left = left + 'px';
    preview.style.top  = top  + 'px';
  }

  function showPreviewFor(path, name, hasPreview, row) {
    if (previewCurrentPath === path) return; // already showing — don't reposition
    clearTimeout(previewShowTimer);
    clearTimeout(previewHideTimer);

    // Small delay so quick mouse passes to click buttons don't trigger the preview
    previewShowTimer = setTimeout(() => {
      clearInterval(previewPollTimer);
      previewCurrentPath = path;
      previewName.textContent = name;
      previewImg.style.animation = '';
      previewImg.style.backgroundImage = '';
      document.getElementById('hoverPreviewPlaybar').style.animation = '';

      preview.classList.add('visible');
      positionPreviewAtRow(row);

      if (hasPreview) {
        loadPreviewImage(path);
      } else {
        showPreviewLoading(0);
        triggerPreviewBuild(path);
      }
    }, 200);
  }

  async function loadPreviewImage(path) {
    const url = `/api/preview?path=${encodeURIComponent(path)}`;
    const [meta, imgLoaded] = await Promise.all([
      fetch(`/api/preview/meta?path=${encodeURIComponent(path)}`).then(r => r.json()).catch(() => ({frames: 150, width: 320, height: 180})),
      new Promise(resolve => {
        const img = new Image();
        img.onload = () => resolve(true);
        img.onerror = () => resolve(false);
        img.src = url;
      }),
    ]);
    if (previewCurrentPath !== path || !imgLoaded) return;

    const frames = meta.frames || 150;
    const fw = meta.width  || 320;
    const fh = meta.height || 180;
    const stripH = fh * frames;

    // Resize the popup frame to match the actual preview dimensions
    previewImg.style.width  = fw + 'px';
    previewImg.style.height = fh + 'px';
    document.getElementById('hoverPreview').style.width = fw + 'px';

    previewImg.innerHTML = '';
    previewImg.style.backgroundImage = `url('${url}')`;
    previewImg.style.backgroundSize  = `${fw}px ${stripH}px`;
    previewImg.style.setProperty('--strip-h', `-${stripH}px`);
    const dur = getPreviewDuration();
    previewImg.style.animation = `preview-roll ${dur}s steps(${frames}) infinite`;
    document.getElementById('hoverPreviewPlaybar').style.animation = `preview-progress ${dur}s linear infinite`;
  }

  function showPreviewLoading(pct) {
    previewImg.classList.remove('rolling');
    previewImg.style.backgroundImage = '';
    previewImg.innerHTML = `
      <div class="hover-preview-loading">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="#444"><path d="M21 3H3C2 3 1 4 1 5v14c0 1.1.9 2 2 2h18c1.1 0 2-.9 2-2V5c0-1-1-2-2-2zm0 16H3V5h18v14z"/></svg>
        <div>Generating preview… ${pct}%</div>
        <div class="hover-preview-prog"><div class="hover-preview-prog-fill" style="width:${pct}%"></div></div>
      </div>`;
  }

  async function triggerPreviewBuild(path) {
    try {
      await fetch(`/api/preview/build?path=${encodeURIComponent(path)}&${previewParams()}`, { method: 'POST' });
      startQueuePolling();
    } catch(e) { return; }

    previewPollTimer = setInterval(async () => {
      if (previewCurrentPath !== path) { clearInterval(previewPollTimer); return; }
      try {
        const res = await fetch(`/api/preview/progress?path=${encodeURIComponent(path)}`);
        const data = await res.json();
        if (previewCurrentPath !== path) { clearInterval(previewPollTimer); return; }
        if (data.done && !data.err) {
          clearInterval(previewPollTimer);
          loadPreviewImage(path);
        } else if (data.done && data.err) {
          clearInterval(previewPollTimer);
          previewImg.innerHTML = `<div class="hover-preview-loading" style="color:#f28b82">${escapeHtml(data.err)}</div>`;
        } else {
          showPreviewLoading(data.percent || 0);
        }
      } catch(e) { clearInterval(previewPollTimer); }
    }, 1500);
  }

  function hidePreview() {
    clearTimeout(previewShowTimer); // cancel pending show
    previewHideTimer = setTimeout(() => {
      preview.classList.remove('visible');
      previewCurrentPath = null;
      previewImg.style.animation = '';
      document.getElementById('hoverPreviewPlaybar').style.animation = '';
      clearInterval(previewPollTimer);
    }, 120);
  }

  // Use mouseover (delegation) so we get one event per row entry, not every pixel
  document.getElementById('fileList').addEventListener('mouseover', e => {
    const row = e.target.closest('.file-row[data-path]');
    if (!row || row.dataset.broken === 'true' || row.dataset.path.includes('/CLIPS/')) return;
    clearTimeout(previewHideTimer);
    showPreviewFor(row.dataset.path, row.dataset.name, row.dataset.hasPreview === 'true', row);
  });

  document.getElementById('fileList').addEventListener('mouseout', e => {
    // Only hide when leaving a row entirely (not moving between child elements)
    const row = e.target.closest('.file-row[data-path]');
    if (row && row.contains(e.relatedTarget)) return;
    hidePreview();
  });

  // Mobile: touchstart shows preview, touchend hides after delay
  document.getElementById('fileList').addEventListener('touchstart', e => {
    const row = e.target.closest('.file-row[data-path]');
    if (!row) return;
    showPreviewFor(row.dataset.path, row.dataset.name, row.dataset.hasPreview === 'true', row);
  }, { passive: true });

  document.getElementById('fileList').addEventListener('touchend', () => {
    setTimeout(() => hidePreview(), 2000);
  }, { passive: true });

  // ── Preview settings ──────────────────────────────────────────────
  function loadPreviewSettings() {
    const s = JSON.parse(localStorage.getItem('previewSettings') || '{}');
    if (s.res)      document.getElementById('cfgPreviewRes').value      = s.res;
    if (s.frames)   document.getElementById('cfgPreviewFrames').value   = s.frames;
    if (s.quality)  document.getElementById('cfgPreviewQuality').value  = s.quality;
    if (s.duration) document.getElementById('cfgPreviewDuration').value = s.duration;
  }
  function savePreviewSettings() {
    localStorage.setItem('previewSettings', JSON.stringify({
      res:      document.getElementById('cfgPreviewRes').value,
      frames:   document.getElementById('cfgPreviewFrames').value,
      quality:  document.getElementById('cfgPreviewQuality').value,
      duration: document.getElementById('cfgPreviewDuration').value,
    }));
  }
  function getPreviewDuration() {
    return parseInt(document.getElementById('cfgPreviewDuration').value) || 10;
  }
  function previewParams() {
    const [w, h] = document.getElementById('cfgPreviewRes').value.split('x');
    return `width=${w}&height=${h}`
      + `&frames=${document.getElementById('cfgPreviewFrames').value}`
      + `&quality=${document.getElementById('cfgPreviewQuality').value}`;
  }
  function togglePreviewSettings() {
    document.getElementById('previewSettingsToggle').classList.toggle('open');
    document.getElementById('previewSettings').classList.toggle('open');
  }
  loadPreviewSettings();

  // ── Sprite settings ───────────────────────────────────────────────
  function loadSettings() {
    const s = JSON.parse(localStorage.getItem('spriteSettings') || '{}');
    if (s.res)      document.getElementById('cfgRes').value      = s.res;
    if (s.interval) document.getElementById('cfgInterval').value = s.interval;
    if (s.grid)     document.getElementById('cfgGrid').value     = s.grid;
  }
  function saveSettings() {
    localStorage.setItem('spriteSettings', JSON.stringify({
      res:      document.getElementById('cfgRes').value,
      interval: document.getElementById('cfgInterval').value,
      grid:     document.getElementById('cfgGrid').value,
    }));
  }
  function spriteParams() {
    const [w, h] = document.getElementById('cfgRes').value.split('x');
    const [cols, rows] = document.getElementById('cfgGrid').value.split('x');
    const interval = document.getElementById('cfgInterval').value;
    return `width=${w}&height=${h}&cols=${cols}&rows=${rows}&interval=${interval}`;
  }
  function toggleSettings() {
    const toggle = document.getElementById('settingsToggle');
    const panel  = document.getElementById('spriteSettings');
    toggle.classList.toggle('open');
    panel.classList.toggle('open');
  }
  loadSettings();

  // ── Sprite queue ──────────────────────────────────────────────────
  const dismissedJobs = new Set();
  let queuePoller = null;

  function startQueuePolling() {
    if (queuePoller) return;
    queuePoller = setInterval(pollQueue, 2000);
  }
  function stopQueuePolling() {
    clearInterval(queuePoller);
    queuePoller = null;
  }

  async function pollQueue() {
    try {
      const res = await fetch('/api/queue');
      const jobs = await res.json();
      renderQueue(jobs);
      if (!(jobs || []).some(j => !j.done)) stopQueuePolling();
    } catch(e) {}
  }

  function fmtETA(percent, startedAt) {
    if (!startedAt || percent <= 2) return '';
    const elapsed = (Date.now() - new Date(startedAt).getTime()) / 1000;
    if (elapsed < 2) return '';
    const rate = percent / elapsed;
    const rem = (100 - percent) / rate;
    if (rem < 5) return '';
    if (rem < 60) return `~${Math.round(rem)}s left`;
    const m = Math.floor(rem / 60), s = Math.round(rem % 60);
    return `~${m}m ${s < 10 ? '0' : ''}${s}s left`;
  }

  function renderQueue(jobs) {
    const el = document.getElementById('spriteQueue');
    const visible = (jobs || []).filter(j => !dismissedJobs.has(j.path));
    if (!visible.length) { el.innerHTML = '<div class="queue-empty">No jobs yet</div>'; return; }
    el.innerHTML = visible.slice(0, 30).map(j => {
      const pct  = Math.min(100, j.percent || 0);
      const cls  = j.err ? 'error' : j.done ? 'done' : '';
      const pctLabel = j.err ? '✗' : j.done ? '✓' : pct + '%';
      const eta  = (!j.done && !j.err) ? fmtETA(pct, j.startedAt) : '';
      const type = j.type || 'sprite';
      const typeLabel = type === 'preview' ? 'Preview' : 'Sprite';
      return `<div class="queue-item">
        <div class="queue-item-top">
          <span class="queue-type ${type}">${typeLabel}</span>
          <span class="queue-item-name" title="${escapeHtml(j.name || j.path)}">${escapeHtml(j.name || j.path)}</span>
          <span class="queue-item-pct ${cls}">${pctLabel}</span>
        </div>
        <div class="queue-bar"><div class="queue-bar-fill ${cls}" style="width:${pct}%"></div></div>
        ${eta ? `<div class="queue-eta">${eta}</div>` : ''}
        <span class="queue-dismiss" onclick="dismissJob('${escapeHtml(j.path)}')">✕</span>
      </div>`;
    }).join('');
  }

  function dismissJob(path) {
    dismissedJobs.add(path);
    pollQueue();
  }

  // ── Sprite build ──────────────────────────────────────────────────
  function rowBuildSprites(event, entry) {
    event.stopPropagation();
    startBuild(entry.path, entry.name);
  }
  function ctxBuildSprites() {
    if (!ctxEntry) return;
    const { path, name } = ctxEntry;
    closeMenu();
    startBuild(path, name);
  }

  async function startBuild(path, name) {
    try {
      await fetch(`/api/sprite/build?path=${encodeURIComponent(path)}&${spriteParams()}`, { method: 'POST' });
      startQueuePolling();
      pollQueue();
    } catch(e) { showToast('Build failed: ' + e.message); }
  }

  async function buildFolderSprites() {
    const folder = currentPath === '/' ? '' : currentPath;
    try {
      const res = await fetch(`/api/sprite/build-folder?path=${encodeURIComponent(currentPath)}&${spriteParams()}`, { method: 'POST' });
      const data = await res.json();
      showToast(`Queued ${data.queued} video${data.queued !== 1 ? 's' : ''}`);
      startQueuePolling();
      pollQueue();
    } catch(e) { showToast('Failed: ' + e.message); }
  }

  let buildAllSpritePoller = null;

  async function buildAllSprites() {
    if (buildAllSpritePoller) { showToast('Already running'); return; }
    try {
      await fetch(`/api/sprite/build-all?${spriteParams()}`, { method: 'POST' });
      startQueuePolling();
      pollQueue();
      buildAllSpritePoller = setInterval(async () => {
        try {
          const res = await fetch('/api/sprite/build-all');
          const data = await res.json();
          updateBuildAllUI(data);
          if (!data.running) {
            clearInterval(buildAllSpritePoller);
            buildAllSpritePoller = null;
            loadDirectory(currentPath);
          }
        } catch(e) { clearInterval(buildAllSpritePoller); buildAllSpritePoller = null; }
      }, 2000);
    } catch(e) { showToast('Failed: ' + e.message); }
  }

  function updateBuildAllUI(data) {
    const status = document.getElementById('buildAllStatus');
    const track  = document.getElementById('buildAllProgTrack');
    const fill   = document.getElementById('buildAllProgFill');
    if (!data.running && data.total === 0) {
      status.textContent = 'All videos'; track.style.display = 'none'; return;
    }
    track.style.display = 'block';
    if (data.running) {
      status.textContent = `${data.done} / ${data.total}${data.current ? ' — ' + data.current : ''}`;
      fill.style.width = (data.total > 0 ? data.done / data.total * 100 : 0) + '%';
      fill.classList.remove('done');
    } else {
      status.textContent = `Done — ${data.done} built`;
      fill.style.width = '100%'; fill.classList.add('done');
    }
  }

  // Check on load
  (async () => {
    try {
      const res = await fetch('/api/sprite/build-all');
      const data = await res.json();
      updateBuildAllUI(data);
      if (data.running) {
        startQueuePolling();
        buildAllSpritePoller = setInterval(async () => {
          const r = await fetch('/api/sprite/build-all');
          const d = await r.json();
          updateBuildAllUI(d);
          if (!d.running) { clearInterval(buildAllSpritePoller); buildAllSpritePoller = null; }
        }, 2000);
      }
    } catch(e) {}
    pollQueue();
  })();


  async function ctxRecover() {
    if (!ctxEntry) return;
    const { path, name } = ctxEntry;
    closeMenu();
    showToast(`Recovering "${name}"…`);
    try {
      const res = await fetch(`/api/recover?path=${encodeURIComponent(path)}`, { method: 'POST' });
      if (!res.ok) {
        const msg = await res.text();
        showToast('Recovery failed: ' + msg.slice(0, 80));
        return;
      }
      const data = await res.json();
      const recovered = data.recovered.split('/').pop();
      showToast(`Recovered as "${recovered}" ✓`);
      loadDirectory(currentPath);
    } catch(e) {
      showToast('Recovery error: ' + e.message);
    }
  }

  function ctxCopyUrl() {
    if (!ctxEntry) return;
    const url = `${window.location.origin}/files${encodedFilePath(ctxEntry.path)}`;
    copyText(url, 'URL copied');
    closeMenu();
  }

  function ctxCopyVMPath() {
    if (!ctxEntry) return;
    copyText(ctxEntry.vmPath || ctxEntry.path, 'VM path copied');
    closeMenu();
  }

  async function ctxDelete() {
    if (!ctxEntry) return;
    const entry = ctxEntry;
    closeMenu();
    if (!confirm(`Delete "${entry.name}"?\n\nThis cannot be undone.`)) return;
    try {
      const res = await fetch(`/api/files?path=${encodeURIComponent(entry.path)}`, { method: 'DELETE' });
      if (!res.ok) throw new Error(await res.text());
      showToast(`"${entry.name}" deleted`);
      loadDirectory(currentPath);
    } catch(e) {
      alert('Delete failed: ' + e.message);
    }
  }

  // ── Toast ─────────────────────────────────────────────────────────
  let toastTimer;
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.remove('show'), 2200);
  }

  function copyText(text, successMsg) {
    const msg = successMsg || 'Copied!';
    if (navigator.clipboard && window.isSecureContext) {
      navigator.clipboard.writeText(text).then(() => showToast(msg));
    } else {
      const ta = document.createElement('textarea');
      ta.value = text;
      ta.style.cssText = 'position:fixed;opacity:0';
      document.body.appendChild(ta);
      ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
      showToast(msg);
    }
  }

  // ── Player ────────────────────────────────────────────────────────
  let shakaPlayer = null;

  async function openPlayer(path, name) {
    document.getElementById('playerTitle').textContent = name;
    document.getElementById('playerError').style.display = 'none';
    document.getElementById('playerOverlay').classList.add('open');
    if (!shakaPlayer) {
      showPlayerError({ message: 'Player still loading, please try again.' });
      return;
    }
    try {
      await shakaPlayer.load(`/files${path}`);
      document.getElementById('videoEl').play().catch(() => {});
    } catch (e) {
      if (e && e.code === 7000) return;
      showPlayerError(e);
    }
  }

  async function closePlayer() {
    document.getElementById('playerOverlay').classList.remove('open');
    document.getElementById('videoEl').pause();
    if (shakaPlayer) await shakaPlayer.unload();
  }

  function showPlayerError(e) {
    const bar = document.getElementById('playerError');
    const msg = document.getElementById('playerErrorMsg');
    if (e && e.code) {
      msg.textContent = `Playback error (code ${e.code}): ${e.message || 'unsupported format or network issue'}`;
    } else {
      msg.textContent = e ? (e.message || String(e)) : 'Unknown error';
    }
    bar.style.display = 'flex';
  }

  document.getElementById('playerOverlay').addEventListener('click', function(e) {
    if (e.target === this) closePlayer();
  });

  document.addEventListener('keydown', e => {
    const video = document.getElementById('videoEl');
    const open = document.getElementById('playerOverlay').classList.contains('open');
    if (e.key === 'Escape') { closeMenu(); if (open) closePlayer(); return; }
    if (!open) return;
    switch (e.key) {
      case 'ArrowRight': e.preventDefault(); video.currentTime += 5;  break;
      case 'ArrowLeft':  e.preventDefault(); video.currentTime -= 5;  break;
      case 'ArrowUp':    e.preventDefault(); video.volume = Math.min(1, video.volume + 0.1); break;
      case 'ArrowDown':  e.preventDefault(); video.volume = Math.max(0, video.volume - 0.1); break;
      case ' ':          e.preventDefault(); video.paused ? video.play() : video.pause(); break;
    }
  });

  // ── Generate All Previews ─────────────────────────────────────────
  let genAllPoller = null;

  async function startGenerateAll() {
    if (genAllPoller) return; // already running
    try {
      const res = await fetch(`/api/preview/build-all?${previewParams()}`, { method: 'POST' });
      const data = await res.json();
      updateGenAllUI(data);
      startQueuePolling();
      if (data.running || (data.total > 0 && data.done < data.total)) {
        pollGenerateAll();
      }
    } catch(e) {
      document.getElementById('genAllStatus').textContent = 'Error: ' + e.message;
    }
  }

  function pollGenerateAll() {
    genAllPoller = setInterval(async () => {
      try {
        const res = await fetch('/api/preview/build-all');
        const data = await res.json();
        updateGenAllUI(data);
        if (!data.running) {
          clearInterval(genAllPoller);
          genAllPoller = null;
          loadDirectory(currentPath); // refresh to show new hasPreview flags
        }
      } catch(e) {
        clearInterval(genAllPoller);
        genAllPoller = null;
      }
    }, 2000);
  }

  function updateGenAllUI(data) {
    const status = document.getElementById('genAllStatus');
    const track  = document.getElementById('genAllProgTrack');
    const fill   = document.getElementById('genAllProgFill');

    if (!data.running && data.total === 0) {
      status.textContent = 'All videos';
      track.style.display = 'none';
      return;
    }
    track.style.display = 'block';
    if (data.running) {
      const name = data.current ? data.current : '…';
      status.textContent = `${data.done} / ${data.total} — ${name}`;
      const pct = data.total > 0 ? (data.done / data.total * 100) : 0;
      fill.style.width = pct + '%';
      fill.classList.remove('done');
    } else {
      status.textContent = `Done — ${data.done} previews built`;
      fill.style.width = '100%';
      fill.classList.add('done');
    }
  }

  // Check if a bulk job is already running on page load
  (async () => {
    try {
      const res = await fetch('/api/preview/build-all');
      const data = await res.json();
      updateGenAllUI(data);
      if (data.running) pollGenerateAll();
    } catch(e) {}
  })();

  navigate('/');
</script>

<script src="https://cdn.jsdelivr.net/npm/shaka-player/dist/shaka-player.compiled.js"></script>
<script>
  (async () => {
    shaka.polyfill.installAll();
    const video = document.getElementById('videoEl');
    shakaPlayer = new shaka.Player();
    await shakaPlayer.attach(video);
    shakaPlayer.addEventListener('error', e => {
      if (e.detail && e.detail.code !== 7000) showPlayerError(e.detail);
    });
  })();
</script>
</body>
